{% extends 'base/base.html' %}

{% block title %}{{ title }} - SMDB{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>{{ title }}</h5>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите удалить город <strong>{{ object.name }}</strong>?</p>
                <p class="text-muted">Это действие нельзя отменить.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>Удалить
                        </button>
                        <a href="{% url 'datacenter:city_list' %}" class="btn btn-secondary">
                            <i class="bi bi-x-lg me-1"></i>Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
